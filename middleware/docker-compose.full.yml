version: '3.8'

services:
  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - middleware_net

  # Permify
  permify:
    image: ghcr.io/permify/permify:latest
    container_name: permify
    command: serve
    ports:
      - "3476:3476"
      - "3478:3478"
    environment:
      - PERMIFY_DATABASE_ENGINE=memory
    volumes:
      - ./permify/schema.perm:/etc/permify/schema.perm
    networks:
      - middleware_net

  # Temporal
  temporal:
    image: temporalio/auto-setup:1.20.0
    container_name: temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - middleware_net

  # PostgreSQL for Temporal
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_USER=temporal
    ports:
      - "5432:5432"
    networks:
      - middleware_net

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - middleware_net

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - middleware_net

  # APISIX
  apisix:
    image: apache/apisix:2.15.0-debian
    container_name: apisix
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml
    ports:
      - "9080:9080"
      - "9443:9443"
    networks:
      - middleware_net

  # Redis for Dapr state store
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - middleware_net

  # Security Tools
  openappsec:
    image: openappsec/agent:latest
    container_name: openappsec
    ports:
      - "8443:8443"
    networks:
      - middleware_net

  wazuh:
    image: wazuh/wazuh-manager:4.5.0
    container_name: wazuh
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    networks:
      - middleware_net

  opencti:
    image: opencti/platform:5.8.0
    container_name: opencti
    ports:
      - "8081:8080"
    environment:
      - APP__ADMIN__EMAIL=admin@opencti.io
      - APP__ADMIN__PASSWORD=ChangeMe
      - APP__ADMIN__TOKEN=ChangeMe
    networks:
      - middleware_net

networks:
  middleware_net:
    driver: bridge
