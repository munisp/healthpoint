  <head>

    <!-- Mobile / PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HealthPoint IDR" />
    <meta name="msapplication-TileColor" content="#1e40af" />
    <meta name="theme-color" content="#1e40af" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="HealthPoint IDR Platform — Comprehensive No Surprises Act Independent Dispute Resolution for healthcare claims processing, provider management, and payment reconciliation." />
    <meta name="keywords" content="NSA, IDR, No Surprises Act, healthcare, claims, dispute resolution, provider, health plan, payment" />

    <meta name="robots" content="noindex, nofollow" /><!-- Internal tool — not for public indexing -->

    <!-- Open Graph (for sharing) -->

    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker with update detection
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((registration) => {
              console.log('[App] Service worker registered:', registration.scope);

              // Check for updates every 60 seconds
              setInterval(() => registration.update(), 60000);

              // Handle new service worker waiting to activate
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available — notify user
                    console.log('[App] New version available — reloading...');
                    // Clear all caches and reload
                    newWorker.postMessage({ type: 'CLEAR_CACHE' });
                    setTimeout(() => window.location.reload(), 500);
                  }
                });
              });
            })
            .catch((err) => console.warn('[App] Service worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
