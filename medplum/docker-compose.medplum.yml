version: "3.9"

# HealthPoint Medplum FHIR R4 Server Stack
# Integrates with the main HealthPoint middleware stack via shared networks.
# Run: docker compose -f middleware/docker-compose.production.yml -f medplum/docker-compose.medplum.yml up -d

services:

  # ─── Dedicated PostgreSQL for Medplum ────────────────────────────────────────
  # Medplum requires its own PostgreSQL instance (schema managed by Medplum internally)
  postgres-medplum:
    image: postgres:16-alpine
    container_name: healthpoint-postgres-medplum
    restart: unless-stopped
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: ${MEDPLUM_DB_PASSWORD:-medplum_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_medplum_data:/var/lib/postgresql/data
      - ./config/postgres-medplum-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - healthpoint-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on

  # ─── Medplum FHIR R4 Server ──────────────────────────────────────────────────
  medplum-server:
    image: medplum/medplum-server:latest
    container_name: healthpoint-medplum-server
    restart: unless-stopped
    depends_on:
      postgres-medplum:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MEDPLUM_CONFIG: /etc/medplum/medplum.config.json
    volumes:
      - ./config/medplum.config.json:/etc/medplum/medplum.config.json:ro
      - medplum_binary:/var/medplum/binary
    ports:
      - "8103:8103"
    networks:
      - healthpoint-internal
      - healthpoint-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.medplum-api.rule=Host(`fhir.healthpoint.local`)"
      - "traefik.http.services.medplum-api.loadbalancer.server.port=8103"

  # ─── Medplum App (Admin UI) ───────────────────────────────────────────────────
  medplum-app:
    image: medplum/medplum-app:latest
    container_name: healthpoint-medplum-app
    restart: unless-stopped
    depends_on:
      medplum-server:
        condition: service_healthy
    environment:
      MEDPLUM_BASE_URL: http://medplum-server:8103/
    ports:
      - "3001:3000"
    networks:
      - healthpoint-internal
      - healthpoint-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Medplum Bot Worker (for FHIR Subscriptions / Bots) ──────────────────────
  # Medplum Bots run as Lambda functions in AWS; locally we use the server's
  # built-in bot runner which processes subscription events from BullMQ/Redis.
  # No separate container needed — the medplum-server handles bot execution.

volumes:
  postgres_medplum_data:
    driver: local
  medplum_binary:
    driver: local

networks:
  healthpoint-internal:
    external: true
    name: healthpoint-internal
  healthpoint-external:
    external: true
    name: healthpoint-external
