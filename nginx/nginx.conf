events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    server_tokens off;  # Hide nginx version

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/wasm
        image/svg+xml
        font/woff2;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream servers
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream api_gateway {
        server api-gateway:8000;
        keepalive 64;
    }

    upstream ai_fraud {
        server ai-fraud-detection:8001;
        keepalive 16;
    }

    upstream claims {
        server claims-processing:8002;
        keepalive 32;
    }

    upstream providers {
        server provider-management:8003;
        keepalive 16;
    }

    upstream patients {
        server patient-management:8004;
        keepalive 16;
    }

    upstream audit {
        server audit-compliance:8005;
        keepalive 16;
    }

    upstream notifications {
        server notification:8006;
        keepalive 16;
    }

    upstream analytics {
        server analytics-reporting:8007;
        keepalive 16;
    }

    upstream users {
        server user-management:8008;
        keepalive 16;
    }

    upstream documents {
        server document-management:8009;
        keepalive 16;
    }

    upstream integration {
        server integration:8010;
        keepalive 16;
    }

    upstream workflow {
        server workflow-engine:8011;
        keepalive 16;
    }

    upstream configuration {
        server configuration:8012;
        keepalive 8;
    }

    upstream monitoring {
        server monitoring:8013;
        keepalive 8;
    }

    upstream backup {
        server backup:8014;
        keepalive 8;
    }

    upstream security {
        server security:8015;
        keepalive 16;
    }

    upstream mlflow {
        server mlflow:5000;
        keepalive 8;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security headers (applied to all responses) ───────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'none';" always;

        # ── index.html: NEVER cache (cache-busting) ───────────────────────────
        location = / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Force no-cache for index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            # Security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location = /index.html {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Force no-cache for index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ── Service Worker: no-cache ──────────────────────────────────────────
        location = /sw.js {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
        }

        # ── Static assets: long-lived cache (content-hashed filenames) ────────
        location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp|wasm)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Vite uses content hashes — safe to cache aggressively
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ── Frontend SPA (all other routes) ──────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            # HTML responses: no-cache
            add_header Cache-Control "no-cache" always;
        }

        # ── API Gateway ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=200 nodelay;
            limit_conn conn_limit 100;
            proxy_pass http://api_gateway/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout 300s;
            # No caching for API responses
            add_header Cache-Control "no-store" always;
        }

        # ── Keycloak auth endpoints ───────────────────────────────────────────
        location /auth/ {
            limit_req zone=login burst=20 nodelay;
            proxy_pass http://keycloak:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── Mojaloop callbacks ────────────────────────────────────────────────
        location /mojaloop/callbacks {
            proxy_pass http://api_gateway/mojaloop/callbacks;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Cache-Control "no-store" always;
        }

        # ── MLflow ────────────────────────────────────────────────────────────
        location /mlflow/ {
            proxy_pass http://mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}\n';
            add_header Content-Type application/json;
            add_header Cache-Control "no-store";
        }

        # ── Prometheus metrics ────────────────────────────────────────────────
        location /metrics {
            # Restrict to internal network only
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://monitoring/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Block common attack vectors ───────────────────────────────────────
        location ~* \.(env|git|svn|htaccess|htpasswd)$ {
            deny all;
            return 404;
        }

        location ~* /(wp-admin|wp-login|phpmyadmin|adminer) {
            deny all;
            return 404;
        }
    }

    # ── HTTPS server (production) ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Redirect to HTTP server block (same config)
        include /etc/nginx/conf.d/locations.conf;
    }
}
